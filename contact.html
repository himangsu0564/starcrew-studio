<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Starcrew Studio</title>
    <link rel="icon" href="starcrew logo.jpg" type="image/jpeg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-blue: #00d4ff; --card-bg: rgba(22, 22, 26, 0.9); --text-light: #e0e0e0; }
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--text-light);
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80');
            background-size: cover; background-attachment: fixed; min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 60px 20px; }
        .back-btn { text-decoration: none; color: var(--primary-blue); font-weight: bold; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .contact-card { background: var(--card-bg); padding: 40px; border-radius: 25px; border: 1px solid #333; backdrop-filter: blur(10px); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--primary-blue); font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; }
        .btn-submit { background: var(--primary-blue); color: #000; padding: 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-submit:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--primary-blue); }
        footer { text-align: center; padding: 40px; color: #444; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <h1 style="text-align:center; text-shadow: 0 0 15px var(--primary-blue);">Transmission Center</h1>
    <div class="contact-card">
        <form action="https://formspree.io/f/xlgwpkjl" method="POST">
            <div class="form-group">
                <label>Explorer Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Return Signal (Email)</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Your Message</label>
                <textarea name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn-submit">SEND TRANSMISSION</button>
        </form>
    </div>
</div>
<footer>&copy; 2026 Starcrew Studio</footer>
</body>
</html>
