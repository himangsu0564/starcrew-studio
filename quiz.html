<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guardian Quiz | Starcrew Studio</title>
    <link rel="icon" href="starcrew logo.jpg" type="image/jpeg">
    <style>
        body { background: #0a0a0c; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .quiz-card { background: #16161a; max-width: 600px; margin: 0 auto; padding: 40px; border-radius: 20px; border: 1px solid #00d4ff; }
        .option { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: rgba(0, 212, 255, 0.1); border: 1px solid #333; 
            color: white; cursor: pointer; border-radius: 10px;
        }
        .option:hover { background: #00d4ff; color: black; }
        #result { display: none; font-size: 1.5rem; color: #00d4ff; }
    </style>
</head>
<body>
    <div class="quiz-card">
        <h1>Which Guardian Are You?</h1>
        <div id="quiz-content">
            <p id="question">What is your greatest strength?</p>
            <button class="option" onclick="select('John')">Leadership & Vision</button>
            <button class="option" onclick="select('Alex')">Logic & Strategy</button>
            <button class="option" onclick="select('Maria')">Empathy & Kindness</button>
            <button class="option" onclick="select('Sam')">Strength & Protection</button>
        </div>
        <div id="result"></div>
        <br>
        <a href="index.html" style="color: grey; text-decoration: none;">Back Home</a>
    </div>

    <script>
        function select(name) {
            document.getElementById('quiz-content').style.display = 'none';
            const res = document.getElementById('result');
            res.style.display = 'block';
            res.innerHTML = `You are <strong>${name}</strong>!<br><small>Welcome to the Starcrew.</small>`;
        }
    </script>
</body>
</html>
