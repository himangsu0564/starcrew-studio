<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Quiz | Starcrew Studio</title>
    <link rel="icon" href="starcrew logo.jpg" type="image/jpeg">
    <style>
        :root {
            --primary-blue: #00d4ff;
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
        }

        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px 20px; /* Reduced side padding for mobile */
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .quiz-card { 
            background: var(--card-bg); 
            max-width: 600px; 
            width: 100%; /* Ensures it takes full width on small screens */
            margin: 0 auto; 
            padding: 40px 20px; 
            border-radius: 20px; 
            border: 1px solid var(--primary-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            box-sizing: border-box;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--primary-blue);
        }

        #question {
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        .option { 
            display: block; 
            width: 100%; 
            padding: 18px; /* Slightly larger for easier tapping */
            margin: 12px 0; 
            background: rgba(0, 212, 255, 0.05); 
            border: 1px solid #333; 
            color: white; 
            cursor: pointer; 
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent; /* Removes blue flash on mobile tap */
        }

        .option:hover, .option:active { 
            background: var(--primary-blue); 
            color: black; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        #result { 
            display: none; 
            font-size: 1.5rem; 
            color: var(--primary-blue);
            padding: 20px;
            line-height: 1.6;
        }

        .back-home {
            display: inline-block;
            margin-top: 30px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-home:hover {
            color: var(--primary-blue);
        }

        /* Responsive adjustments for very small screens */
        @media (max-width: 480px) {
            body { padding: 20px 15px; }
            h1 { font-size: 1.6rem; }
            .quiz-card { padding: 30px 15px; }
            .option { padding: 15px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="quiz-card">
        <h1>Which Guardian Are You?</h1>
        <div id="quiz-content">
            <p id="question">What is your greatest strength?</p>
            <button class="option" onclick="select('John')">Leadership & Vision</button>
            <button class="option" onclick="select('Alex')">Logic & Strategy</button>
            <button class="option" onclick="select('Maria')">Empathy & Kindness</button>
            <button class="option" onclick="select('Sam')">Strength & Protection</button>
        </div>
        <div id="result"></div>
        <a href="index.html" class="back-home">← Back to Home</a>
    </div>

    <script>
        function select(name) {
            document.getElementById('quiz-content').style.display = 'none';
            const res = document.getElementById('result');
            res.style.display = 'block';
            res.innerHTML = `You are <strong>${name}</strong>!<br><small style="color:white; font-size:0.9rem; opacity:0.8;">Welcome to the Starcrew.</small>`;
        }
    </script>
</body>
</html>
