<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Quiz | Starcrew Studio</title>
    <link rel="icon" href="starcrew logo.jpg" type="image/jpeg">
    <style>
        :root {
            --primary-blue: #00d4ff;
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
        }

        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .quiz-card { 
            background: var(--card-bg); 
            max-width: 600px; 
            width: 100%; 
            margin: 0 auto; 
            padding: 40px 20px; 
            border-radius: 20px; 
            border: 1px solid var(--primary-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            box-sizing: border-box;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--primary-blue);
        }

        #progress {
            color: var(--primary-blue);
            font-size: 0.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #question {
            font-size: 1.2rem;
            margin-bottom: 25px;
            min-height: 3em;
        }

        .option { 
            display: block; 
            width: 100%; 
            padding: 18px; 
            margin: 12px 0; 
            background: rgba(0, 212, 255, 0.05); 
            border: 1px solid #333; 
            color: white; 
            cursor: pointer; 
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .option:hover, .option:active { 
            background: var(--primary-blue); 
            color: black; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        #result { 
            display: none; 
            padding: 20px;
            line-height: 1.6;
        }

        .back-home {
            display: inline-block;
            margin-top: 30px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-home:hover {
            color: var(--primary-blue);
        }

        @media (max-width: 480px) {
            body { padding: 20px 15px; }
            h1 { font-size: 1.6rem; }
            .quiz-card { padding: 30px 15px; }
            .option { padding: 15px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="quiz-card">
        <h1>Which Guardian Are You?</h1>
        
        <div id="quiz-content">
            <p id="progress">Question 1 of 4</p>
            <p id="question">Loading first challenge...</p>
            <div id="options-container">
                </div>
        </div>

        <div id="result"></div>
        
        <a href="index.html" class="back-home">← Back to Home</a>
    </div>

    <script>
        const heroLore = {
            John: {
                role: "The Determined Leader",
                desc: "The driving force behind the adventure. You lead with responsibility, courage, and trust in your friends."
            },
            Alex: {
                role: "The Loyal Strategist",
                desc: "Calm under pressure and logical. Your loyalty to your friends never wavers, even in intense battles."
            },
            Maria: {
                role: "The Compassionate Heart",
                desc: "You bring empathy and emotional strength to the team, staying united even during the darkest moments."
            },
            Sam: {
                role: "The Brave Protector",
                desc: "A dependable protector who proves that bravery comes from believing in your own worth."
            }
        };

        const questions = [
            {
                q: "What is your greatest strength?",
                options: [
                    { text: "Leadership & Vision", hero: "John" },
                    { text: "Logic & Strategy", hero: "Alex" },
                    { text: "Empathy & Kindness", hero: "Maria" },
                    { text: "Strength & Protection", hero: "Sam" }
                ]
            },
            {
                q: "How do you react in a sudden crisis?",
                options: [
                    { text: "I take charge and give orders", hero: "John" },
                    { text: "I pause to analyze the best solution", hero: "Alex" },
                    { text: "I make sure everyone is emotionally okay", hero: "Maria" },
                    { text: "I step in front to shield others from danger", hero: "Sam" }
                ]
            },
            {
                q: "What is your biggest inner struggle?",
                options: [
                    { text: "The fear of failing those who follow me", hero: "John" },
                    { text: "The fear of being abandoned", hero: "Alex" },
                    { text: "The pain of losing someone I love", hero: "Maria" },
                    { text: "The feeling that I'm not good enough", hero: "Sam" }
                ]
            },
            {
                q: "Which environment do you feel most powerful in?",
                options: [
                    { text: "The front lines of an unknown frontier", hero: "John" },
                    { text: "A quiet room filled with maps and data", hero: "Alex" },
                    { text: "A peaceful place where people feel safe", hero: "Maria" },
                    { text: "Standing guard at the gates of home", hero: "Sam" }
                ]
            }
        ];

        let currentQuestion = 0;
        let scores = { John: 0, Alex: 0, Maria: 0, Sam: 0 };

        function loadQuestion() {
            const qData = questions[currentQuestion];
            document.getElementById('progress').innerText = `Question ${currentQuestion + 1} of ${questions.length}`;
            document.getElementById('question').innerText = qData.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = ''; 

            qData.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = opt.text;
                btn.onclick = () => select(opt.hero);
                container.appendChild(btn);
            });
        }

        function select(hero) {
            scores[hero]++;
            currentQuestion++;

            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const quizContent = document.getElementById('quiz-content');
            const res = document.getElementById('result');
            
            const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
            const info = heroLore[winner];

            quizContent.style.display = 'none';
            res.style.display = 'block';
            
            res.innerHTML = `
                <span style="font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 1px;">The Awakening</span>
                <h2 style="margin: 10px 0; color: var(--primary-blue); font-size: 2rem;">You are ${winner}</h2>
                <p style="font-style: italic; color: #ccc; margin-bottom: 15px;">"${info.role}"</p>
                <p style="font-size: 1rem; color: white; line-height: 1.5; opacity: 0.9;">${info.desc}</p>
                <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
                <small style="color:var(--primary-blue); font-size:0.9rem;">Welcome to the Starcrew.</small>
            `;
        }

        // Initialize the quiz
        loadQuestion();
    </script>
</body>
</html>
