<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map of the Parallel World</title>

<style>
/* New Style for Back Button */
.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    background: rgba(0, 234, 255, 0.1);
    border: 1px solid #00eaff;
    color: #00eaff;
    text-decoration: none;
    font-weight: bold;
    border-radius: 50px;
    z-index: 1000;
    transition: 0.3s;
    box-shadow: 0 0 10px #00eaff;
}

.back-btn:hover {
    background: #00eaff;
    color: #000;
    box-shadow: 0 0 20px #00eaff;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #050b1f, #000);
    color: white;
    overflow: hidden; /* Prevent body scroll on desktop */
}

h1 {
    text-align: center;
    padding: 20px;
    color: #00eaff;
    text-shadow: 0 0 20px #00eaff;
    font-size: 2rem;
}

.map {
    position: relative;
    width: 100vw;
    height: 85vh;
}

.realm {
    position: absolute;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 2px solid #00eaff;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    background: rgba(0,234,255,0.05);
    box-shadow: 0 0 20px #00eaff;
    font-size: 0.9rem;
    padding: 10px;
    box-sizing: border-box;
}

.realm:hover {
    transform: scale(1.15);
    box-shadow: 0 0 40px #00eaff;
    background: rgba(0,234,255,0.2);
}

.center {
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 0, 255, 0.1);
    border-color: #ff00ff;
    box-shadow: 0 0 30px #ff00ff;
}

.top { top: 5%; left: 50%; transform: translateX(-50%); }
.bottom { bottom: 5%; left: 50%; transform: translateX(-50%); }
.left { left: 5%; top: 50%; transform: translateY(-50%); }
.right { right: 5%; top: 50%; transform: translateY(-50%); }

.top-left { top: 15%; left: 15%; }
.top-right { top: 15%; right: 15%; }
.bottom-left { bottom: 15%; left: 15%; }
.bottom-right { bottom: 15%; right: 15%; }

.lore-box {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    padding: 20px;
    border: 2px solid #00eaff;
    border-radius: 12px;
    background: rgba(0,0,0,0.9);
    box-shadow: 0 0 25px #00eaff;
    display: none;
    z-index: 1001;
    text-align: center;
}

/* MOBILE RESPONSIVENESS */
@media (max-width: 768px) {
    body {
        overflow: auto; /* Allow scrolling on phones to see the whole map */
    }

    h1 {
        font-size: 1.5rem;
        padding: 60px 10px 10px 10px; /* Space for back button */
    }

    .map {
        width: 1000px; /* Fixed width on mobile ensures the layout doesn't collapse */
        height: 800px;
        margin-bottom: 100px;
    }

    .lore-box {
        position: fixed; /* Keep lore box visible while scrolling map */
        width: 90%;
        bottom: 10px;
        font-size: 0.9rem;
        padding: 15px;
    }

    .back-btn {
        padding: 8px 15px;
        font-size: 0.8rem;
    }
}
</style>
</head>

<body>

<a href="index.html" class="back-btn">← Back to Home</a>

<h1>🌌 The Parallel World – Nexus Map</h1>

<div class="map">

    <div class="realm center" onclick="showLore('nexus')">Nexus of Realms</div>

    <div class="realm top" onclick="showLore('sun')">Realm of Sun</div>
    <div class="realm bottom" onclick="showLore('moon')">Realm of Moon</div>
    <div class="realm left" onclick="showLore('earth')">Realm of Earth</div>
    <div class="realm right" onclick="showLore('stars')">Realm of Stars</div>

    <div class="realm top-left" onclick="showLore('abyss')">The Abyss</div>
    <div class="realm top-right" onclick="showLore('forest')">Forest of Whispers</div>
    <div class="realm bottom-left" onclick="showLore('desert')">Desert of Shadows</div>
    <div class="realm bottom-right" onclick="showLore('harmony')">Heart of the Forest</div>

</div>

<div id="lore" class="lore-box"></div>

<script>
function showLore(place) {
    const lore = {
        nexus: "The Nexus of Realms is the heart of all dimensions. Every realm converges here. It is where the Chaos Entity once attempted to unravel existence itself.",
        sun: "A blazing land of fire trials and molten guardians. The Sunstone was forged here through courage and endurance.",
        moon: "A silver realm of shadows and illusion. The Mondial was claimed by embracing fear and navigating the labyrinth of night.",
        earth: "Towering mountains and ancient forests test resilience. The Earth Crystal was secured through strength and unity.",
        stars: "A celestial domain of floating islands and cosmic puzzles. The Star Shard glows with the power of the universe.",
        abyss: "A crimson sky hangs above a massive chasm. The descent into darkness tested their courage against monstrous guardians.",
        forest: "A mystical woodland filled with illusions and whispers. Here, intelligence and perception determined survival.",
        desert: "Under the Eternal Eclipse, this harsh wasteland hid relics that would determine the fate of both worlds.",
        harmony: "The Heart of the Forest protects the Harmony Stone — the core of balance between the parallel world and Earth."
    };

    const box = document.getElementById("lore");
    box.style.display = "block";
    box.innerText = lore[place];
    
    // Auto-scroll to lore box on mobile
    if (window.innerWidth <= 768) {
        box.scrollIntoView({ behavior: 'smooth' });
    }
}
</script>

</body>
</html>
