<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardians Gallery | Starcrew Studio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #00d4ff; 
            --bg-dark: #0a0a0c; 
            --card-bg: rgba(22, 22, 26, 0.9); 
            --text-light: #e0e0e0; 
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            color: var(--text-light);
            /* WHOLE WEBSITE BACKGROUND */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80');
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            min-height: 100vh;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }

        .back-btn { 
            text-decoration: none; 
            color: var(--primary-blue); 
            font-weight: bold; 
            margin-bottom: 30px; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            transition: 0.3s;
        }
        .back-btn:hover { transform: translateX(-5px); }

        h1 { font-size: 2.5rem; text-align: center; margin-bottom: 40px; text-shadow: 0 0 15px var(--primary-blue); }

        /* SEARCH BAR */
        .search-container { position: relative; max-width: 500px; margin: 0 auto 50px auto; }
        #heroSearch { 
            width: 100%; 
            padding: 15px 50px; 
            border-radius: 50px; 
            border: 1px solid #333; 
            background: rgba(0,0,0,0.7); 
            color: white; 
            font-size: 1rem;
            backdrop-filter: blur(5px);
        }
        .search-icon { position: absolute; left: 20px; top: 18px; color: var(--primary-blue); }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; }
        .char-card { 
            background: var(--card-bg); 
            padding: 35px 20px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #333; 
            cursor: pointer; 
            transition: 0.3s; 
            backdrop-filter: blur(10px);
        }
        .char-card:hover { border-color: var(--primary-blue); transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2); }
        .char-card i { font-size: 3rem; color: var(--primary-blue); margin-bottom: 15px; }

        /* MODAL POPUP */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 9999; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(8px);
        }
        .modal-content { 
            background: #16161a; 
            margin: 10% auto; 
            padding: 40px; 
            border-radius: 25px; 
            max-width: 600px; 
            width: 90%; 
            border: 1px solid var(--primary-blue); 
            position: relative;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 30px; color: #555; cursor: pointer; }
        .close-modal:hover { color: var(--primary-blue); }

        .modal-body h2 { color: var(--primary-blue); margin-top: 0; font-size: 2rem; }
        .modal-body .role { font-style: italic; color: #888; margin-bottom: 20px; display: block; }
        .modal-body p { line-height: 1.8; color: #ccc; }
        .guardian-tag { 
            display: inline-block; background: rgba(0, 212, 255, 0.1); 
            color: var(--primary-blue); padding: 8px 15px; border-radius: 5px; 
            font-weight: bold; margin-top: 20px; border: 1px solid rgba(0, 212, 255, 0.3);
        }

        footer { text-align: center; padding: 60px; color: #444; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        
        <h1>The Guardians of Balance</h1>

        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="heroSearch" placeholder="Find a Guardian..." onkeyup="filterHeroes()">
        </div>

        <div class="grid" id="heroGrid">
            <div class="char-card" onclick="openLore('john')">
                <i class="fas fa-crown"></i>
                <h3>John</h3>
                <p>The Determined Leader</p>
            </div>
            <div class="char-card" onclick="openLore('alex')">
                <i class="fas fa-chess-knight"></i>
                <h3>Alex</h3>
                <p>The Loyal Strategist</p>
            </div>
            <div class="char-card" onclick="openLore('maria')">
                <i class="fas fa-heart"></i>
                <h3>Maria</h3>
                <p>The Compassionate Heart</p>
            </div>
            <div class="char-card" onclick="openLore('sam')">
                <i class="fas fa-shield-alt"></i>
                <h3>Sam</h3>
                <p>The Brave Protector</p>
            </div>
        </div>
    </div>

    <div id="loreModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeLore()">&times;</span>
            <div id="loreBody" class="modal-body">
                </div>
        </div>
    </div>

    <footer>&copy; 2026 Starcrew Studio</footer>

    <script>
        // Full Descriptions Data
        const heroLore = {
            john: {
                name: "John",
                role: "The Determined Leader",
                desc: "John is the driving force behind the adventure. Curious about parallel worlds and fearless in exploring the unknown, he is the one who first discovers the mysterious game that changes their lives. Throughout their journey, John grows from a curious gamer into a true leader. His greatest fear is failure, but he learns that mistakes are stepping stones to growth. He leads with responsibility, courage, and trust in his friends.",
                tag: "Guardian of Strength, Leadership, and Resilience"
            },
            alex: {
                name: "Alex",
                role: "The Loyal Strategist",
                desc: "Alex is calm under pressure and thinks logically during intense battles. While others may act on instinct, Alex analyzes situations and finds strategic solutions. Deep down, he struggles with a fear of abandonment, but through the trials of the parallel world, he learns that true bonds cannot be broken. His loyalty to his friends never wavers.",
                tag: "Guardian of Loyalty, Intelligence, and Trust"
            },
            maria: {
                name: "Maria",
                role: "The Compassionate Heart",
                desc: "Maria brings empathy and emotional strength to the team. She is perceptive and often understands situations on a deeper level than others. Her greatest challenge is overcoming the fear of loss, but she learns that memories and love never truly disappear. Her emotional intelligence helps the group stay united during their darkest moments.",
                tag: "Guardian of Compassion, Courage, and Emotional Strength"
            },
            sam: {
                name: "Sam",
                role: "The Brave Protector",
                desc: "Sam may doubt himself at times, but when it truly matters, he stands firm. He struggles with feelings of inadequacy, yet repeatedly proves that he is capable and strong. Sam’s growth is one of the most powerful transformations in the story. He evolves into a dependable protector who believes in his own worth.",
                tag: "Guardian of Bravery & Protection"
            }
        };

        // Function to open pop-up
        function openLore(heroKey) {
            const hero = heroLore[heroKey];
            const loreBody = document.getElementById('loreBody');
            loreBody.innerHTML = `
                <h2>${hero.name}</h2>
                <span class="role">${hero.role}</span>
                <p>${hero.desc}</p>
                <div class="guardian-tag">${hero.tag}</div>
            `;
            document.getElementById('loreModal').style.display = 'block';
        }

        // Function to close pop-up
        function closeLore() {
            document.getElementById('loreModal').style.display = 'none';
        }

        // Function for the Search Bar
        function filterHeroes() {
            let input = document.getElementById('heroSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('char-card');

            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
                if (name.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // Close when clicking background
        window.onclick = function(event) {
            let modal = document.getElementById('loreModal');
            if (event.target == modal) closeLore();
        }
    </script>
</body>
</html>
